services:
  fastzero_database:
    image: postgres
    volumes:
      - pgdata:/var/lib/postgresql/
    environment:
      POSTGRES_USER: app_user
      POSTGRES_DB: app_db
      POSTGRES_PASSWORD: app_password
    ports:
      - "5434:5434"

  fastzero_app:
    image: fastzero_app
    entrypoint: /app/entrypoint.sh
    build: .
    ports:
      - "8008:8008"
    depends_on:
      - fastzero_database
    environment:
      DATABASE_URL: postgresql+psycopg_async://app_user:app_password@fastzero_database:5434/app_db

volumes:
  pgdata:
